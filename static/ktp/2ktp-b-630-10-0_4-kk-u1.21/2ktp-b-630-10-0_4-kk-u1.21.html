<!DOCTYPE html>
<html xmlns='http://www.w3.org/1999/xhtml'>

    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>KeyShotXR</title>
    <style type="text/css">
      body { -ms-touch-action: none; }
    </style>
    <script type="text/javascript" src="2ktp-b-630-10-0_4-kk-u1.21/files/KeyShotXR.js"></script>
    <script type="text/javascript">
      var keyshotXR;

      function initKeyShotXR() {
        var nameOfDiv = "KeyShotXR";
        var folderName = "2ktp-b-630-10-0_4-kk-u1.21";
        var viewPortWidth = 800;
        var viewPortHeight = 600;
        
                // === Определение темы ===
        let isDark = false;

        try {
            // Приоритет 1: Параметр из URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('theme')) {
                isDark = urlParams.get('theme') === 'dark';
            } 
            // Приоритет 2: Тема родительской страницы
            else {
                const parentTheme = window.parent.document.documentElement.getAttribute('data-theme');
                isDark = (parentTheme === 'dark');
            }
        } catch (e) {
            // Приоритет 3: Системная тема
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        var backgroundColor = isDark ? "#1d1e20" : "transparent";
            
         // var backgroundColor = "transparent";
        
        // var backgroundColor = "#FFFFFF";
        var uCount = 18;
        var vCount = 1;
        var uWrap = true;
        var vWrap = false;
        var uMouseSensitivity = -0.05;
        var vMouseSensitivity = 0.00555556;
        var uStartIndex = 9;
        var vStartIndex = 0;
        var minZoom = 1;
        var maxZoom = 1;
        var rotationDamping = 0.96;
        var downScaleToBrowser = true;
        var addDownScaleGUIButton = false;
        var downloadOnInteraction = true;
        var imageExtension = "png";
        var showLoading = false;
        var loadingIcon = "ks_logo.png"; // Set to empty string for default icon.
        var allowFullscreen = false; // Double-click in desktop browsers for fullscreen.
        var uReverse = false;
        var vReverse = false;
        var hotspots = {};
        var isIBooksWidget = false;
        
        keyshotXR = new keyshotXR(nameOfDiv,folderName,viewPortWidth,viewPortHeight,backgroundColor,uCount,vCount,uWrap,vWrap,uMouseSensitivity,vMouseSensitivity,uStartIndex,vStartIndex,minZoom,maxZoom,rotationDamping,downScaleToBrowser,addDownScaleGUIButton,downloadOnInteraction,imageExtension,showLoading,loadingIcon,allowFullscreen,uReverse,vReverse,hotspots,isIBooksWidget);
      }

      window.onload = initKeyShotXR;
    </script>
  </head>
  <body oncontextmenu="return false;">
    <div id="KeyShotXR"></div>
  </body>
</html>
